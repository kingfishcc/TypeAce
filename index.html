<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鍵盤神手</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://cdn.jsdelivr.net/npm/gensen-rounded-web@1.0.1/css/gensen-rounded-tw.css');
    @import url('https://fonts.googleapis.com/css2?family=Chiron+GoRound+TC:wght@400;500;700&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Iansui&display=swap');
    body { 
      font-family: 'Chiron GoRound TC', 'GenSenRounded TW', sans-serif;
      background-color: #f8fafc;
    }

    .typing-paragraph {
      line-height: 2.2;
      text-align: left;
      word-break: break-all;
      margin-bottom: 1.5rem;
      font-size: 24px;
      letter-spacing: 0;
      white-space: pre-wrap;
    }

    .indent-zh { text-indent: 2em; } 
    .indent-en { text-indent: 5ch; } 

    .bopo-indent-block {
      display: inline-block;
      width: 9.5rem; 
      height: 1px;
    }

    .scrollbar-hide::-webkit-scrollbar { display: none; }
  </style>

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0?external=react",
        "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"
      }
    }
  </script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 overflow-x-hidden">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { initializeApp } from 'firebase/app';
    import { 
      getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged,
      signOut, GoogleAuthProvider, signInWithPopup 
    } from 'firebase/auth';
    import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp, getDocs, deleteDoc, doc } from 'firebase/firestore';
    import { Trophy, Clock, User, Globe, RotateCcw, Medal, Keyboard, Mail, X, LogOut, ArrowRight, AlertTriangle, Settings, Trash2 } from 'lucide-react';

    // --- 1. Firebase 初始化 ---
    const externalFirebaseConfig = {
      apiKey: "AIzaSyAKitKzkqS5_K7lehivcAAZoGX_u4-LsQs",
      authDomain: "typeace-c8f54.firebaseapp.com",
      projectId: "typeace-c8f54",
      storageBucket: "typeace-c8f54.firebasestorage.app",
      messagingSenderId: "544799963119",
      appId: "1:544799963119:web:25dbee6e8bad94ef70a81a",
      measurementId: "G-2XZL871D6V"
    };

    const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : externalFirebaseConfig;
    const app = Object.keys(firebaseConfig).length > 0 ? initializeApp(firebaseConfig) : null;
    const auth = app ? getAuth(app) : null;
    const db = app ? getFirestore(app) : null;
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'typing-hero-pro-v2-15';

    // --- 工具函式 ---
    const generateDefaultName = () => `匿名挑戰者${Math.floor(1000 + Math.random() * 9000)}`;

    const hasProfanity = (text) => {
      if (!text) return false;
      const lowerText = text.toLowerCase().replace(/\s+/g, ''); 
      const badWords = ['幹你娘', '幹你', '靠北', '靠夭', '媽的', '王八蛋', 'fuck', 'shit', 'bitch'];
      return badWords.some(word => lowerText.includes(word));
    };

    const formatTime = (timestamp) => {
      if (!timestamp) return '';
      const d = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
      const pad = (n) => n.toString().padStart(2, '0');
      return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    };

    const FALLBACK_DB = {
      "zh": [
        "這(ㄓㄜˋ) 是(ㄕˋ) 備(ㄅㄟˋ) 用(ㄩㄥˋ) 題(ㄊㄧˊ) 庫(ㄎㄨˋ) ， 請(ㄑㄧㄥˇ) 確(ㄑㄩㄝˋ) 認(ㄖㄣˋ) 外(ㄨㄞˋ) 部(ㄅㄨˋ) 檔(ㄉㄤˇ) 案(ㄢˋ) 是(ㄕˋ) 否(ㄈㄡˇ) 載(ㄗㄞˋ) 入(ㄖㄨˋ) 成(ㄔㄥˊ) 功(ㄍㄨㄥ) 。"
      ],
      "en": [
        "This is the fallback database. Please check if the external file is loaded correctly."
      ]
    };

    // --- 3. 排名系統與徽章 ---
    const getRank = (speed, mode) => {
      const isEn = mode === 'en';
      if(speed >= (isEn ? 100 : 90)) return { name: '傳說時刻', color: 'text-red-600', bg: 'bg-red-50', border: 'border-red-500' };
      if(speed >= (isEn ? 70 : 60)) return { name: '璀璨鑽石', color: 'text-blue-600', bg: 'bg-blue-50', border: 'border-blue-500' };
      if(speed >= (isEn ? 40 : 30)) return { name: '榮耀金牌', color: 'text-yellow-600', bg: 'bg-yellow-50', border: 'border-yellow-500' };
      return { name: '新手銅牌', color: 'text-slate-500', bg: 'bg-slate-50', border: 'border-slate-300' };
    };

    const getMedalStyle = (index) => {
      if (index === 0) return 'bg-[#FFD700] text-yellow-900 shadow-md border-transparent';
      if (index === 1) return 'bg-[#E2E8F0] text-slate-800 shadow-md border-transparent';
      if (index === 2) return 'bg-[#CD7F32] text-white shadow-md border-transparent'; 
      if (index === 3 || index === 4) return 'bg-white text-slate-700 shadow-md border-transparent'; 
      return 'bg-transparent border border-slate-200 text-slate-400'; 
    };

    // --- 4. 單字元元件 ---
    const CharSpan = React.memo(({ char, idx, isTyped, isCorrect, isWrong, isCurrent, userChar, activeRef, onCharClick }) => {
      if (char === '\n') return null; 
      return (
        <span 
          onClick={(e) => onCharClick(e, idx)}
          ref={isCurrent ? activeRef : null} 
          className={`relative inline-block transition-all cursor-pointer ${isCurrent ? "bg-blue-50 rounded-sm" : ""} ${isWrong ? "bg-red-100 rounded-sm" : ""}`}
        >
          {isCurrent && <span className="absolute left-[-1px] top-[10%] bottom-[10%] w-[3px] bg-blue-500 animate-[pulse_1s_ease-in-out_infinite] rounded-full shadow-[0_0_8px_rgba(59,130,246,0.6)] z-10"></span>}
          <span className={`text-[20px] md:text-[24px] font-medium whitespace-pre-wrap ${isTyped ? (isCorrect ? 'text-green-600' : 'text-red-600 line-through decoration-red-400') : 'text-slate-700'}`}>
            {char}
          </span>
          {isWrong && (
            <span className="absolute left-1/2 -translate-x-1/2 -bottom-4 bg-red-500 text-white text-[9px] leading-none font-bold px-1.5 py-0.5 rounded-sm z-20 whitespace-nowrap pointer-events-none shadow-sm">
              {userChar === ' ' ? '空' : userChar}
            </span>
          )}
        </span>
      );
    });

    const BopoBlock = React.memo(({ item, idx, isTyped, isCorrect, isWrong, isCurrent, userChar, activeRef, onCharClick }) => {
      if (item.char === '\n') return null;
      return (
        <div 
          onClick={(e) => onCharClick(e, idx)}
          ref={isCurrent ? activeRef : null} 
          className={`relative inline-flex flex-col items-center justify-end w-[4.5rem] h-[5rem] transition-all rounded-lg cursor-pointer ${isCurrent ? 'bg-blue-50 shadow-inner' : isWrong ? 'bg-red-100 shadow-inner' : ''}`}
        >
          {isCurrent && <div className="absolute left-[0px] top-[15%] bottom-[15%] w-[4px] bg-blue-500 animate-[pulse_1s_ease-in-out_infinite] rounded-full shadow-[0_0_8px_rgba(59,130,246,0.6)] z-10"></div>}
          {item.bopo && <span className="text-[14px] text-slate-500 font-bold tracking-tighter mb-1 whitespace-nowrap">{item.bopo}</span>}
          <span className={`text-[32px] font-medium leading-none mb-1 whitespace-pre-wrap ${isTyped ? (isCorrect ? 'text-green-600' : 'text-red-500 line-through decoration-red-400') : 'text-slate-600'}`}>
            {item.char}
          </span>
          {isWrong && (
            <div className="absolute -bottom-5 bg-red-500 text-white text-[9px] leading-none font-bold px-1.5 py-0.5 rounded-sm shadow-sm z-20 whitespace-nowrap pointer-events-none">
              {userChar === ' ' ? '空' : userChar}
            </div>
          )}
        </div>
      );
    });

    function App() {
      const [user, setUser] = useState(null);

      const [displayName, setDisplayName] = useState(() => localStorage.getItem('typingHeroName') || generateDefaultName());
      const [nameError, setNameError] = useState(""); 
      const [mode, setMode] = useState('zh'); 
      const [selectedTime, setSelectedTime] = useState(60); 
      const [status, setStatus] = useState('idle'); 
      const [timeLeft, setTimeLeft] = useState(selectedTime);
      const [currentParagraphs, setCurrentParagraphs] = useState([]);
      const [currentBopoParagraphs, setCurrentBopoParagraphs] = useState([]);
      const [targetText, setTargetText] = useState("");
      const [userInput, setUserInput] = useState("");
      const [cursorPosition, setCursorPosition] = useState(0); 
      const [inputValue, setInputValue] = useState(""); 
      const [activeModal, setActiveModal] = useState('none');
      const [stats, setStats] = useState({ speed: 0, accuracy: 0, rank: null, typed: 0, correct: 0, timeElapsed: 0 });
      const [publicScores, setPublicScores] = useState([]);
      const [personalHistory, setPersonalHistory] = useState([]);
      const [authError, setAuthError] = useState('');
      const [systemWarning, setSystemWarning] = useState('');
      const [isAuthenticating, setIsAuthenticating] = useState(false);
      const [leaderboardMode, setLeaderboardMode] = useState('zh'); 
      
      const [articleDatabase, setArticleDatabase] = useState(null);
      const [articleIndex, setArticleIndex] = useState(0);
      const [isWebView, setIsWebView] = useState(false);

      const [isDeveloper, setIsDeveloper] = useState(false);
      const [devUsername, setDevUsername] = useState('');
      const [devPassword, setDevPassword] = useState('');
      const [devError, setDevError] = useState('');
      const [recordToDelete, setRecordToDelete] = useState(null); 

      const [hasSeenWelcome, setHasSeenWelcome] = useState(() => {
        try { return localStorage.getItem('typingHeroWelcome') === 'true'; } 
        catch(e) { return false; }
      });

      const inputRef = useRef(null);
      const cursorRef = useRef(null);
      const containerRef = useRef(null); 
      const isComposingRef = useRef(false); 

      const stateRef = useRef({ status, len: userInput.length });
      useEffect(() => { stateRef.current = { status, len: userInput.length }; }, [status, userInput.length]);

      useEffect(() => { if (!hasSeenWelcome) setActiveModal('welcome'); }, [hasSeenWelcome]);

      useEffect(() => {
        const ua = navigator.userAgent || navigator.vendor || window.opera;
        if (ua.includes('Instagram') || ua.includes('FBAN') || ua.includes('FBAV') || ua.includes('Line')) {
          setIsWebView(true);
        }
      }, []);

      useEffect(() => {
        fetch('articles.json?t=' + new Date().getTime())
          .then(res => {
            if (!res.ok) throw new Error('找不到外部題庫檔案');
            return res.json();
          })
          .then(data => { setArticleDatabase(data); })
          .catch(err => {
            console.warn("無法讀取外部 articles.json，自動切換為內建備用題庫。", err);
            setArticleDatabase(FALLBACK_DB);
            setSystemWarning("無法讀取題庫！請確認 articles.json 與 index.html 放在同一個資料夾。");
          });
      }, []);

      useEffect(() => {
        if (cursorRef.current && containerRef.current && status === 'playing') {
          const container = containerRef.current;
          const cursor = cursorRef.current;
          const containerRect = container.getBoundingClientRect();
          const cursorRect = cursor.getBoundingClientRect();
          const relativeTop = cursorRect.top - containerRect.top;
          const offset = relativeTop - (container.clientHeight / 2) + (cursorRect.height / 2);
          if (Math.abs(offset) > 10) {
            container.scrollBy({ top: offset, behavior: 'auto' });
          }
        }
      }, [cursorPosition, status]);

      const tTypedCount = userInput.length;
      let tCorrectCount = 0;
      for (let i = 0; i < Math.min(userInput.length, targetText.length); i++) {
        if (userInput[i] === targetText[i]) tCorrectCount++;
      }
      const curAcc = tTypedCount === 0 ? 0 : (tCorrectCount / tTypedCount) * 100;
      const elapsedReal = selectedTime - timeLeft;
      const curSpd = status === 'playing' ? Math.round((mode === 'en' ? tCorrectCount/5 : tCorrectCount) / (elapsedReal/60 || 1/60)) : 0;

      const getModeLabelText = (targetMode) => {
        if (targetMode === 'zh') return '中文模式';
        if (targetMode === 'zh-bopo') return '中文（注音）模式';
        return '英文模式';
      };

      // Firebase 登入狀態監聽
      useEffect(() => {
        if (!auth) return;
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else { 
              await signInAnonymously(auth); 
            }
          } catch (error) { 
            console.error("Firebase 登入失敗 (可能是無痕模式或規則限制):", error); 
          }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, (u) => {
          setUser(u); 
        });
        return () => unsubscribe();
      }, []);

      const initGame = () => {
        if (!articleDatabase) return;
        const pool = mode === 'en' ? articleDatabase.en : articleDatabase.zh;
        if (!pool || pool.length === 0) return;
        
        const rawText = pool[articleIndex % pool.length];
        
        if (mode === 'en') {
          const paras = rawText.split('\n').filter(p => p.trim().length > 0)
                               .map((p, i, arr) => i < arr.length - 1 ? p.trim() + ' ' : p.trim());
          setCurrentParagraphs(paras);
          setTargetText(paras.join('')); 
        } else if (mode === 'zh') {
          const finalContent = rawText.replace(/\(.*?\)/g, '').replace(/ /g, '');
          const paras = finalContent.split('\n').filter(p => p.trim().length > 0);
          setCurrentParagraphs(paras);
          setTargetText(paras.join('')); 
        } else if (mode === 'zh-bopo') {
          const paras = rawText.replace(/ /g, '').split('\n').filter(p => p.trim().length > 0);
          const bopoParas = paras.map(paraStr => {
            const parsed = [];
            const regex = /(.?)\((.*?)\)|(.)/g;
            let match;
            while ((match = regex.exec(paraStr)) !== null) {
              if (match[1]) parsed.push({ char: match[1], bopo: match[2] });
              else if (match[3]) parsed.push({ char: match[3], bopo: '' });
            }
            return parsed;
          });
          setCurrentBopoParagraphs(bopoParas);
          setTargetText(bopoParas.map(p => p.map(i => i.char).join('')).join(''));
        }

        setArticleIndex(prev => prev + 1); 
        setUserInput(""); setInputValue(""); setCursorPosition(0); 
        setTimeLeft(selectedTime); setStatus('idle'); 
        if (activeModal === 'settlement') setActiveModal('none');
        setStats({ speed: 0, accuracy: 0, rank: null, typed: 0, correct: 0, timeElapsed: 0 });
        setTimeout(() => inputRef.current?.focus(), 100);
      };

      useEffect(() => { if (articleDatabase) initGame(); }, [mode, selectedTime, articleDatabase]);

      useEffect(() => {
        let timer;
        if (status === 'playing' && timeLeft > 0) timer = setInterval(() => setTimeLeft(t => t - 1), 1000);
        else if (timeLeft === 0 && status === 'playing') endGame();
        return () => clearInterval(timer);
      }, [status, timeLeft]);

      const handleInputChange = (e) => {
        if (status === 'finished') return;
        let val = e.target.value;
        const newCursor = e.target.selectionStart;
        
        if (val.length > userInput.length) {
          const addedChar = val[newCursor - 1];
          if (addedChar === '\n') {
            val = val.slice(0, newCursor - 1) + val.slice(newCursor);
          }
        }

        setInputValue(val); 
        setCursorPosition(newCursor); 
        if (status === 'idle' && val.length > 0) setStatus('playing');

        let normalizedVal = val;
        if (mode === 'en') {
          normalizedVal = normalizedVal.replace(/[\uff01-\uff5e]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0xfee0)).replace(/\u3000/g, ' ');
        } else {
          normalizedVal = normalizedVal.replace(/[\uff21-\uff3a\uff41-\uff5a\uff10-\uff19]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0xfee0));
        }
        normalizedVal = normalizedVal.replace(/['‘’]/g, "'").replace(/["“”]/g, '"');

        setUserInput(normalizedVal);
        
        if (!isComposingRef.current && normalizedVal.length >= targetText.length && newCursor >= targetText.length) {
          endGame(normalizedVal.substring(0, targetText.length));
        }
      };

      const handleSelect = (e) => setCursorPosition(e.target.selectionStart);

      const handleCharClick = React.useCallback((e, idx) => {
        e.stopPropagation();
        if (stateRef.current.status === 'finished') return;
        const targetIdx = Math.min(idx, stateRef.current.len);
        if (inputRef.current) {
          inputRef.current.focus();
          setTimeout(() => {
            inputRef.current.setSelectionRange(targetIdx, targetIdx);
            setCursorPosition(targetIdx);
          }, 0);
        }
      }, []);

      const handleCompositionStart = () => { isComposingRef.current = true; };
      const handleCompositionEnd = (e) => { isComposingRef.current = false; handleInputChange(e); };

      const handleNameChange = (e) => {
        const n = e.target.value; setDisplayName(n);
        if (hasProfanity(n)) setNameError("含不雅字眼");
        else { setNameError(""); localStorage.setItem('typingHeroName', n); }
      };

      const handleDevLogin = (e) => {
        e.preventDefault();
        if (devUsername === 'kingfish' && devPassword === '0403') {
          setIsDeveloper(true);
          setActiveModal('welcome');
          setDevUsername('');
          setDevPassword('');
          setDevError('');
        } else {
          setDevError('帳號或密碼錯誤！');
        }
      };

      const handleGoogleLogin = async () => {
        if (!auth) return;
        setAuthError('');
        setIsAuthenticating(true);
        try {
          const provider = new GoogleAuthProvider();
          const result = await signInWithPopup(auth, provider);
          if (result.user && result.user.displayName && displayName.startsWith('匿名挑戰者')) {
            const n = result.user.displayName.substring(0, 12);
            setDisplayName(n); localStorage.setItem('typingHeroName', n);
          }
          setActiveModal('none');
          setSystemWarning('');
        } catch (err) { 
          console.error("登入失敗:", err); 
          if (err.code === 'auth/unauthorized-domain') {
            setAuthError("【網域未授權】您的 Firebase 尚未允許目前的網址進行登入。請至 Firebase 控制台加入白名單！");
          } else {
            setAuthError(`登入發生錯誤 (${err.code})，請稍後再試。`);
          }
        } finally {
          setIsAuthenticating(false);
        }
      };

      const handleLogout = async () => {
        await signOut(auth);
        try { await signInAnonymously(auth); } catch(e) {}
        const n = generateDefaultName(); setDisplayName(n); localStorage.setItem('typingHeroName', n);
      };

      // 結算與存檔
      const endGame = async (finalInput = userInput) => {
        if (status === 'finished') return;
        setStatus('finished');
        const spent = selectedTime - timeLeft;
        const finalTime = Math.max(spent, 1);
        let fTyped = finalInput.length;
        let fCorrect = 0;
        for (let i = 0; i < Math.min(finalInput.length, targetText.length); i++) {
          if (finalInput[i] === targetText[i]) fCorrect++;
        }
        const acc = fTyped > 0 ? (fCorrect/fTyped)*100 : 0;
        const spd = Math.round((mode==='en'?fCorrect/5:fCorrect)/(finalTime/60));
        const rk = getRank(spd, mode);
        setStats({ speed: spd, accuracy: acc, rank: rk, typed: fTyped, correct: fCorrect, timeElapsed: spent });
        setActiveModal('settlement');
        let safe = displayName.trim();
        if (!safe || hasProfanity(safe)) { safe = generateDefaultName(); setDisplayName(safe); localStorage.setItem('typingHeroName', safe); }
        
        if (user && db && spd > 0) {
          const data = { userId: user.uid, displayName: safe, speed: spd, accuracy: Math.round(acc), mode, timeLimit: selectedTime, rankName: rk.name, timestamp: serverTimestamp() };
          
          try {
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'scores'), data);
            await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'scores'), data);
            setSystemWarning('');

            // --- 自動清理機制：每個模式只保留最新的 5 筆戰績 ---
            const userScoresRef = collection(db, 'artifacts', appId, 'users', user.uid, 'scores');
            const snap = await getDocs(userScoresRef);
            const userRecords = [];
            snap.forEach(d => userRecords.push({ id: d.id, ...d.data() }));
            
            const currentModeRecords = userRecords.filter(r => r.mode === mode);
            currentModeRecords.sort((a, b) => (b.timestamp?.seconds || Infinity) - (a.timestamp?.seconds || Infinity));
            
            if (currentModeRecords.length > 5) {
              const recordsToDelete = currentModeRecords.slice(5);
              for (const record of recordsToDelete) {
                await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'scores', record.id));
              }
            }
          } catch (err) { 
            console.error(err); 
            if (err.code === 'permission-denied' || err.message?.includes('permission')) {
              setSystemWarning("【成績儲存失敗】Firestore 資料庫規則尚未開放。請至 Firebase > Firestore > 規則，設定 allow read, write: if true; 並發布。");
            }
          }
        } else if (!user && spd > 0) {
          // 本機戰績備援機制 (針對無法取得 Firebase 身分的狀況，如無痕模式)
          const localRecord = { id: Date.now().toString(), speed: spd, accuracy: Math.round(acc), mode, timeLimit: selectedTime, rankName: rk.name, timestamp: new Date().toISOString(), isLocal: true };
          const stored = JSON.parse(localStorage.getItem('typingHeroFallbackScores') || '[]');
          stored.push(localRecord);
          // 保留各模式最新的 5 筆
          const currentModeRecords = stored.filter(r => r.mode === mode);
          currentModeRecords.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
          const otherModes = stored.filter(r => r.mode !== mode);
          const newStored = [...otherModes, ...currentModeRecords.slice(0, 5)];
          localStorage.setItem('typingHeroFallbackScores', JSON.stringify(newStored));
          // 強制更新畫面

              const idx = globalIdx++; 
              const isTyped = idx < userInput.length;
              const isCorrect = isTyped && userInput[idx] === targetText[idx];
              const isWrong = isTyped && !isCorrect;
              const isCurrent = idx === cursorPosition; 
              return (
                <BopoBlock 
                  key={idx} idx={idx} item={item} isTyped={isTyped} isCorrect={isCorrect} 
                  isWrong={isWrong} isCurrent={isCurrent} userChar={userInput[idx]} 
                  activeRef={cursorRef} onCharClick={handleCharClick}
                />
              );
            }) : (
              isEn ? (() => {
                const chunks = [];
                let currentChunk = "";
                let isWord = false;
                for (let char of para) {
                  if (char === ' ') {
                    if (currentChunk && isWord) { chunks.push({ type: 'word', text: currentChunk }); currentChunk = ""; }
                    chunks.push({ type: 'space', text: char });
                    isWord = false;
                  } else {
                    if (currentChunk && !isWord) { chunks.push({ type: 'space', text: currentChunk }); currentChunk = ""; }
                    isWord = true;
                    currentChunk += char;
                  }
                }
                if (currentChunk) chunks.push({ type: isWord ? 'word' : 'space', text: currentChunk });

                return chunks.map((chunk, cIdx) => {
                  if (chunk.type === 'word') {
                    return (
                      <span key={`word-${cIdx}`} className="inline-block whitespace-pre-wrap">

                          const idx = globalIdx++;
                          const isTyped = idx < userInput.length;
                          const isCorrect = isTyped && userInput[idx] === targetText[idx];
                          const isWrong = isTyped && !isCorrect;
                          const isCurrent = idx === cursorPosition;
                          return (
                            <CharSpan 
                              key={idx} idx={idx} char={char} isTyped={isTyped} isCorrect={isCorrect}

                            />

                        />

              )}

              {activeModal === 'leaderboard' && (
                <div className="bg-white rounded-[40px] shadow-2xl w-full max-w-2xl p-10 relative text-slate-800 animate-in fade-in flex flex-col max-h-[85vh]">
                  <button onClick={() => setActiveModal('none')} className="absolute top-6 right-6 text-slate-400 z-10"><X size={28} /></button>
                  <div className="flex items-center justify-between mb-6 border-b pb-6 border-slate-100 shrink-0"><div className="flex items-center space-x-3"><Globe className="text-teal-600" size={32} /><h3 className="text-3xl font-black">全服排行榜</h3></div><span className="text-[11px] bg-teal-50 text-teal-700 px-4 py-2 rounded-full font-black shadow-sm">{getModeLabelText(leaderboardMode)}</span></div>
                  <div className="flex justify-center mb-6 shrink-0"><div className="flex bg-slate-100 p-1.5 rounded-2xl gap-1">{[['zh','中文'],['zh-bopo','中文（注音）'],['en','英文']].map(([k,v]) => (<button key={k} onClick={() => setLeaderboardMode(k)} className={`px-4 py-2 rounded-xl text-sm font-bold transition-all ${leaderboardMode===k ? 'bg-white text-teal-600 shadow-sm':'text-slate-400 hover:text-slate-700'}`}>{v}</button>))}</div></div>
                  <div className="space-y-4 overflow-y-auto pr-4 scrollbar-hide flex-grow">
                    {globalLeaderboard.length ? globalLeaderboard.map((r, i) => (
                      <div key={r.id} className={`flex items-center justify-between p-5 rounded-3xl border transition-all ${r.userId === user?.uid ? 'bg-teal-50 border-teal-200' : 'bg-slate-50 border-transparent'}`}>
                        <div className="flex items-center space-x-5">
                          <span className={`w-10 h-10 flex items-center justify-center rounded-full text-lg font-black ${getMedalStyle(i)}`}>{i+1}</span>
                          <div className="flex flex-col text-left">
                            <span className="font-black text-slate-700 text-xl">{r.displayName}</span>
                            <span className="text-[11px] font-bold text-slate-400 mt-0.5">{formatTime(r.timestamp)}</span>
                          </div>
                        </div>
                        <div className="flex items-center gap-4">
                          <span className="font-black text-slate-800 text-4xl">{r.speed} <span className="text-xs font-bold text-slate-400">{leaderboardMode==='en'?'WPM':'CPM'}</span></span>
                          {isDeveloper && (
                            <button onClick={() => setRecordToDelete({ type: 'public', id: r.id })} className="text-red-400 hover:text-red-600 bg-red-50 p-2 rounded-xl transition-colors" title="刪除此紀錄">
                              <Trash2 size={20} />
                            </button>
                          )}
                        </div>
                      </div>
                    )) : <div className="py-12 flex flex-col items-center justify-center space-y-4"><Medal className="text-slate-100" size={64} /><p className="text-base font-medium text-slate-300">目前尚無神手紀錄</p></div>}
                  </div>
                </div>
              )}

              {activeModal === 'history' && (
                <div className="bg-white rounded-[40px] shadow-2xl w-full max-w-2xl p-10 relative text-slate-800 animate-in fade-in flex flex-col max-h-[85vh]">
                  <button onClick={() => setActiveModal('none')} className="absolute top-6 right-6 text-slate-400 z-10"><X size={28} /></button>
                  <div className="flex items-center justify-between mb-8 border-b pb-6 border-slate-100 shrink-0"><div className="flex items-center space-x-3"><Trophy className="text-amber-500" size={32} /><h3 className="text-3xl font-black">我的戰績</h3></div><button onClick={() => setActiveModal('rankInfo')} className="bg-slate-700 text-white px-5 py-2.5 rounded-xl text-sm font-black hover:bg-slate-800 shadow-sm transition-all">段位說明</button></div>
                  <div className="overflow-y-auto pr-4 divide-y-[3px] divide-slate-100 flex-grow">
                    {personalHistory.length === 0 ? <p className="text-center text-slate-300 py-10 font-bold text-xl border-none">目前尚無練習紀錄</p> : ['zh', 'zh-bopo', 'en'].map((mKey) => {
                      const records = personalHistory.filter(r => r.mode === mKey).slice(0, 5);
                      if (records.length === 0) return null;
                      return (
                        <div key={mKey} className="py-8 first:pt-2 last:pb-2">
                          <h4 className="text-lg font-black text-amber-700 mb-5 px-2 tracking-wide">{getModeLabelText(mKey)}</h4>
                          <div className="space-y-4">{records.map(r => (
                            <div key={r.id} className="flex items-center justify-between p-6 bg-slate-50 rounded-3xl border border-transparent">
                              <div className="flex flex-col text-left">
                                <span className="text-xl font-black text-slate-700">{r.rankName} <span className="text-slate-400 text-sm font-normal">（{r.timeLimit/60}分）</span></span>
                                <span className="text-sm font-bold text-slate-400 mt-1">準確率 {r.accuracy}% • {formatTime(r.timestamp)}</span>
                              </div>
                              <div className="flex items-center gap-4">
                                <span className="font-black text-slate-800 text-4xl">{r.speed} <span className="text-xs font-bold text-slate-400">{mKey==='en'?'WPM':'CPM'}</span></span>
                                {isDeveloper && user && (
                                  <button onClick={() => setRecordToDelete({ type: 'private', id: r.id })} className="text-red-400 hover:text-red-600 bg-red-50 p-2 rounded-xl transition-colors" title="刪除此紀錄">
                                    <Trash2 size={20} />
                                  </button>
                                )}
                              </div>
                            </div>
                          ))}</div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              {activeModal === 'settlement' && (
                <div className="bg-white rounded-[32px] shadow-2xl w-full max-w-2xl p-8 relative animate-in zoom-in-95 text-center text-slate-800">
                  <button onClick={() => setActiveModal('none')} className="absolute top-6 right-6 text-slate-300 hover:text-slate-500"><X size={24} /></button>
                  <h2 className="text-2xl font-black mb-6 border-l-[8px] border-violet-800 pl-4 text-left">成績結算</h2>
                  <div className={`py-5 rounded-2xl border-2 ${stats.rank?.border} ${stats.rank?.bg} flex flex-col items-center mb-8 shadow-inner`}><p className="text-[10px] text-slate-400 font-black mb-1 uppercase tracking-widest">榮耀段位</p><p className={`text-4xl font-black tracking-tighter ${stats.rank?.color}`}>{stats.rank?.name}</p></div>
                  <div className="flex justify-around items-center">{[['打字數', stats.typed], ['正確字數', stats.correct], ['正確率', stats.accuracy.toFixed(2)], ['速度', stats.speed.toFixed(2)]].map(([l, v], i) => (<React.Fragment key={l}><div className="flex-1 px-3"><p className="text-slate-400 text-xs font-bold mb-1">{l}</p><p className="text-violet-900 text-3xl font-black tabular-nums">{v}</p></div>{i < 3 && <div className="w-px h-12 bg-violet-100 rounded-full"></div>}</React.Fragment>))}</div>
                  <div className="mt-8 flex justify-center"><button onClick={initGame} className="bg-violet-800 hover:bg-violet-950 text-white px-8 py-2.5 rounded-2xl font-black shadow-xl transition-all hover:-translate-y-1 flex flex-col items-center justify-center gap-1.5 min-w-[160px]"><RotateCcw size={24} strokeWidth={2.5} /><span className="text-xs tracking-widest">再挑戰一次</span></button></div>
                </div>
              )}

              {activeModal === 'auth' && (
                <div className="bg-white rounded-[32px] shadow-2xl w-full max-w-2xl p-10 relative animate-in zoom-in-95 text-center text-slate-800">
                  <button onClick={() => setActiveModal('devLogin')} className="absolute top-6 left-6 text-slate-200 hover:text-slate-400 transition-colors" title="開發者登入"><Settings size={24} /></button>
                  <button onClick={() => setActiveModal('none')} className="absolute top-6 right-6 text-slate-400"><X size={24} /></button>
                  <div className="flex justify-center mb-6"><div className="p-5 bg-blue-50 text-blue-600 rounded-full shadow-inner"><Mail size={40} /></div></div>
                  <h3 className="text-2xl font-black text-center mb-2">Google 帳號登入</h3>
                  <p className="text-slate-400 text-xs mb-8 leading-relaxed">請確認您的網址已加入 Firebase 授權名單</p>
                  <div className="space-y-6 mt-6">
                    {authError && <div className="text-red-500 text-[11px] font-black text-left bg-red-50 p-3 rounded-xl border border-red-100">{authError}</div>}
                    <button onClick={handleGoogleLogin} disabled={isAuthenticating} className="w-full py-4 bg-blue-600 text-white font-black rounded-2xl shadow-xl flex items-center justify-center gap-3 hover:bg-blue-700 transition-all active:scale-95">
                      <svg className="w-6 h-6 mr-3" viewBox="0 0 24 24">
                        <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                        <path fill="none" d="M1 1h22v22H1z" />
                      </svg>
                      使用 Google 登入
                    </button>
                    <button onClick={()=>setActiveModal('none')} className="text-slate-300 text-xs font-bold hover:text-slate-500">暫不登入</button>
                  </div>
                </div>
              )}
            </div>
          )}

          {/* 開發者刪除確認視窗 */}
          {recordToDelete && (
            <div className="fixed inset-0 z-[60] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
              <div className="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl animate-in zoom-in-95">
                <div className="mx-auto w-16 h-16 bg-red-100 text-red-600 flex items-center justify-center rounded-full mb-4">
                  <Trash2 size={32} />
                </div>
                <h3 className="text-xl font-black mb-2">確定刪除紀錄？</h3>
                <p className="text-slate-500 text-sm mb-8">此動作無法復原，請確認是否繼續。</p>
                <div className="flex gap-4">
                  <button onClick={() => setRecordToDelete(null)} className="flex-1 py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-xl transition-all">取消</button>
                  <button onClick={async () => {
                    try {
                      if (!user) {
                        alert("請確保在有 Firebase 權限的狀態下進行刪除。");
                        setRecordToDelete(null);
                        return;
                      }
                      const deletePath = recordToDelete.type === 'public' 
                        ? doc(db, 'artifacts', appId, 'public', 'data', 'scores', recordToDelete.id)
                        : doc(db, 'artifacts', appId, 'users', user.uid, 'scores', recordToDelete.id);
                      await deleteDoc(deletePath);
                      setRecordToDelete(null);
                    } catch(e) {
                      alert("刪除失敗，請檢查 Firebase 權限：" + e.message);
                      setRecordToDelete(null);
                    }
                  }} className="flex-1 py-3 bg-red-600 hover:bg-red-700 text-white font-bold rounded-xl transition-all shadow-md">確定刪除</button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }
    
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
